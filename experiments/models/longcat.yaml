# LongCat Image (6B, BF16) — Meituan's Flux-based text-to-image model
# Architecture: UNET + CFGNorm + FluxGuidance (no LoRA/ControlNet support)

name: "LongCat Image (BF16)"
short_name: longcat
default_node_count: 12

workflow:
  "1":
    class_type: UNETLoader
    inputs:
      unet_name: longcat_image_bf16.safetensors
      weight_dtype: default
    _meta: { title: UNET Loader }

  "2":
    class_type: CLIPLoader
    inputs:
      clip_name: qwen_2.5_vl_7b.safetensors
      type: longcat_image
      device: default
    _meta: { title: CLIP Loader }

  "3":
    class_type: VAELoader
    inputs:
      vae_name: ae.safetensors
    _meta: { title: VAE Loader }

  "4":
    class_type: CFGNorm
    inputs:
      model: ["1", 0]
      strength: 1.0
    _meta: { title: CFG Norm }

  "5":
    class_type: CLIPTextEncode
    inputs:
      clip: ["2", 0]
      text: ""
    _meta: { title: Positive Prompt }

  "6":
    class_type: FluxGuidance
    inputs:
      conditioning: ["5", 0]
      guidance: 4.0
    _meta: { title: Positive FluxGuidance }

  "7":
    class_type: CLIPTextEncode
    inputs:
      clip: ["2", 0]
      text: >-
        blurry, low resolution, oversaturated, harsh lighting,
        messy composition, distorted face, extra fingers,
        bad anatomy, watermark
    _meta: { title: Negative Prompt }

  "8":
    class_type: FluxGuidance
    inputs:
      conditioning: ["7", 0]
      guidance: 4.0
    _meta: { title: Negative FluxGuidance }

  "9":
    class_type: EmptySD3LatentImage
    inputs:
      width: 1024
      height: 1024
      batch_size: 1
    _meta: { title: "Empty Latent (1024x1024)" }

  "10":
    class_type: KSampler
    inputs:
      model: ["4", 0]
      positive: ["6", 0]
      negative: ["8", 0]
      latent_image: ["9", 0]
      seed: 42
      steps: 20
      cfg: 4.0
      sampler_name: euler
      scheduler: simple
      denoise: 1.0
    _meta: { title: KSampler }

  "11":
    class_type: VAEDecode
    inputs:
      samples: ["10", 0]
      vae: ["3", 0]
    _meta: { title: VAE Decode }

  "12":
    class_type: SaveImage
    inputs:
      images: ["11", 0]
      filename_prefix: LongCatClaw
    _meta: { title: Save Image }
