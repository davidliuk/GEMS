# Z-Image-Turbo (6B, BF16) — Alibaba Tongyi Lab's S3-DiT text-to-image model
# Architecture: UNET + ModelSamplingAuraFlow, ConditioningZeroOut for negative
# CRITICAL: cfg=1, sampler=res_multistep, steps=8 — do NOT change these

name: "Z-Image-Turbo (BF16)"
short_name: z-image-turbo
default_node_count: 10

workflow:
  "1":
    class_type: UNETLoader
    inputs:
      unet_name: z_image_turbo_bf16.safetensors
      weight_dtype: default
    _meta: { title: UNET Loader }

  "2":
    class_type: CLIPLoader
    inputs:
      clip_name: qwen_3_4b.safetensors
      type: lumina2
      device: default
    _meta: { title: CLIP Loader }

  "3":
    class_type: VAELoader
    inputs:
      vae_name: ae.safetensors
    _meta: { title: VAE Loader }

  "4":
    class_type: ModelSamplingAuraFlow
    inputs:
      model: ["1", 0]
      shift: 3
    _meta: { title: Model Sampling AuraFlow }

  "5":
    class_type: CLIPTextEncode
    inputs:
      clip: ["2", 0]
      text: ""
    _meta: { title: Positive Prompt }

  "6":
    class_type: ConditioningZeroOut
    inputs:
      conditioning: ["5", 0]
    _meta: { title: Negative (Zeroed Out) }

  "7":
    class_type: EmptySD3LatentImage
    inputs:
      width: 1024
      height: 1024
      batch_size: 1
    _meta: { title: "Empty Latent (1024x1024)" }

  "8":
    class_type: KSampler
    inputs:
      model: ["4", 0]
      positive: ["5", 0]
      negative: ["6", 0]
      latent_image: ["7", 0]
      seed: 42
      steps: 8
      cfg: 1
      sampler_name: res_multistep
      scheduler: simple
      denoise: 1.0
    _meta: { title: KSampler }

  "9":
    class_type: VAEDecode
    inputs:
      samples: ["8", 0]
      vae: ["3", 0]
    _meta: { title: VAE Decode }

  "10":
    class_type: SaveImage
    inputs:
      images: ["9", 0]
      filename_prefix: ZImageTurboClaw
    _meta: { title: Save Image }
